[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/therapies-2/"
  to = "/therapies/"
  status = 301
  force = true

[[redirects]]
  from = "/shambala-holistic-centre/"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/workshops/"
  to = "/sound-baths-yoga/"
  status = 301
  force = true

[[redirects]]
  from = "/massage/"
  to = "/therapies/massage/"
  status = 301
  force = true

[[redirects]]
  from = "/services/"
  to = "/therapies/training/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
