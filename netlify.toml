[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    NODE_VERSION = "22.12.0"

[[redirects]]
  from = "/therapies-2/"
  to = "/therapies/"
  status = 301
  force = true

[[redirects]]
  from = "/shambala-holistic-centre/"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/massage/"
  to = "/therapies/massage/"
  status = 301
  force = true

[[redirects]]
  from = "/services/"
  to = "/therapies/training/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; script-src-attr 'none'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.google.com/recaptcha/; frame-src https://www.google.com/recaptcha/; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
